name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  perl:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
          - runner: macos-26-intel
            architecture: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Verify runner architecture
        run: test "$(uname -m)" = "${{ matrix.architecture }}"
      - name: Syntax check
        run: |
          while IFS= read -r file; do
            /usr/bin/perl -Iconditions/lib -c "$file"
          done < <(find conditions tools t -type f \
            \( -name '*.pl' -o -name '*.pm' -o -name '*.t' \) -print)
      - name: Test
        run: /usr/bin/prove -lr t
      - name: Build and inspect package
        run: |
          tools/build-pkg.pl --output "$RUNNER_TEMP/munki-perls-0.1.0.pkg"
          /usr/sbin/pkgutil --expand "$RUNNER_TEMP/munki-perls-0.1.0.pkg" "$RUNNER_TEMP/expanded"
          /usr/bin/lsbom "$RUNNER_TEMP/expanded/Bom"

  perl-5-8-8:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
            asset: perl-5.8.8-darwin-arm64.tar.zstd
            sha256: f09dbcef349f0fb22e1a6aac84f38623359a42e763eacf519ac3f0a8d7a759d3
          - runner: macos-26-intel
            architecture: x86_64
            asset: perl-5.8.8-darwin-x64.tar.zstd
            sha256: d2394adb9b67a504da6a05690f3df405aae638d6d41b8d30c703773a3ee3bb0e
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Verify runner architecture
        run: test "$(uname -m)" = "${{ matrix.architecture }}"
      - name: Install exact Perl 5.8.8
        env:
          ASSET: ${{ matrix.asset }}
          SHA256: ${{ matrix.sha256 }}
        run: |
          tag=perl-5.8.8-20260321094406
          archive="$RUNNER_TEMP/$ASSET"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/shogo82148/build-perl/releases/download/$tag/$ASSET"
          printf '%s  %s\n' "$SHA256" "$archive" | shasum -a 256 --check
          command -v zstd >/dev/null 2>&1 || brew install zstd
          zstd --decompress --long=30 "$archive" \
            -o "$RUNNER_TEMP/perl-5.8.8.tar"
          mkdir -p "$RUNNER_TEMP/perl-5.8.8" "$RUNNER_TEMP/foundation-stub"
          tar -xf "$RUNNER_TEMP/perl-5.8.8.tar" \
            -C "$RUNNER_TEMP/perl-5.8.8"
          printf 'package Foundation;\nsub import { }\n1;\n' \
            > "$RUNNER_TEMP/foundation-stub/Foundation.pm"
          perl_root="$RUNNER_TEMP/perl-5.8.8"
          perl_lib="$perl_root/lib"
          printf 'PERL588=%s\nPERL5LIB=%s:%s:%s:%s:%s:conditions/lib\n' \
            "$perl_root/bin/perl" \
            "$RUNNER_TEMP/foundation-stub" \
            "$perl_lib/5.8.8/darwin-2level" \
            "$perl_lib/5.8.8" \
            "$perl_lib/site_perl/5.8.8/darwin-2level" \
            "$perl_lib/site_perl/5.8.8" >> "$GITHUB_ENV"
      - name: Verify exact interpreter
        run: test "$($PERL588 -e 'print $]')" = 5.008008
      - name: Compile every Perl source and test
        run: |
          while IFS= read -r file; do
            "$PERL588" -Iconditions/lib -c "$file"
          done < <(find conditions tools t -type f \
            \( -name '*.pl' -o -name '*.pm' -o -name '*.t' \) -print)
      - name: Run Foundation-independent tests
        run: |
          "$PERL588" "$RUNNER_TEMP/perl-5.8.8/bin/prove" -lv \
            t/00-syntax.t t/static-policy.t t/package.t

  release:
    needs: [perl, perl-5-8-8]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Choose release version
        id: release
        run: |
          version="0.1.${GITHUB_RUN_NUMBER}"
          printf 'version=%s\ntag=v%s\npackage=%s/munki-perls-%s.pkg\n' \
            "$version" "$version" "$RUNNER_TEMP" "$version" >> "$GITHUB_OUTPUT"
      - name: Build release package
        run: |
          tools/build-pkg.pl \
            --version "${{ steps.release.outputs.version }}" \
            --output "${{ steps.release.outputs.package }}"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE: ${{ steps.release.outputs.package }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$PACKAGE" --clobber
          else
            gh release create "$TAG" "$PACKAGE" \
              --target "$GITHUB_SHA" \
              --title "munki-perls $RELEASE_VERSION" \
              --generate-notes
          fi
