name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  perl:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
          - runner: macos-26-intel
            architecture: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Verify runner architecture
        run: test "$(uname -m)" = "${{ matrix.architecture }}"
      - name: Syntax check
        run: |
          while IFS= read -r file; do
            /usr/bin/perl -Iconditions/lib -c "$file"
          done < <(find conditions tools -type f \( -name '*.pl' -o -name '*.pm' \) -print)
      - name: Test
        run: /usr/bin/prove -lr t
      - name: Build and inspect package
        run: |
          tools/build-pkg.pl --output "$RUNNER_TEMP/munki-perls-0.1.0.pkg"
          /usr/sbin/pkgutil --expand "$RUNNER_TEMP/munki-perls-0.1.0.pkg" "$RUNNER_TEMP/expanded"
          /usr/bin/lsbom "$RUNNER_TEMP/expanded/Bom"

  release:
    needs: perl
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Choose release version
        id: release
        run: |
          version="0.1.${GITHUB_RUN_NUMBER}"
          printf 'version=%s\ntag=v%s\npackage=%s/munki-perls-%s.pkg\n' \
            "$version" "$version" "$RUNNER_TEMP" "$version" >> "$GITHUB_OUTPUT"
      - name: Build release package
        run: |
          tools/build-pkg.pl \
            --version "${{ steps.release.outputs.version }}" \
            --output "${{ steps.release.outputs.package }}"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE: ${{ steps.release.outputs.package }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$PACKAGE" --clobber
          else
            gh release create "$TAG" "$PACKAGE" \
              --target "$GITHUB_SHA" \
              --title "munki-perls $RELEASE_VERSION" \
              --generate-notes
          fi
