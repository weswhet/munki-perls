<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280" role="img" aria-labelledby="title description">
  <title id="title">munki-perls</title>
  <desc id="description">A luminous pearl inside a property-list document, with twenty-two fact lights and the words native Mac facts in classic Perl.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#120b20"/>
      <stop offset="0.52" stop-color="#24123d"/>
      <stop offset="1" stop-color="#101b2d"/>
    </linearGradient>
    <linearGradient id="document" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b7cff"/>
      <stop offset="1" stop-color="#5ee2c2"/>
    </linearGradient>
    <radialGradient id="pearl" cx="35%" cy="28%" r="72%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.38" stop-color="#f5e9ff"/>
      <stop offset="0.7" stop-color="#c9b7ff"/>
      <stop offset="1" stop-color="#7862bb"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.46" stop-color="#ffffff"/>
      <stop offset="0.47" stop-color="#c9b7ff"/>
      <stop offset="1" stop-color="#6ee7c5"/>
    </linearGradient>
    <filter id="soft-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#07040d" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="718" height="278" rx="30" fill="url(#background)" stroke="#ffffff" stroke-opacity="0.08"/>
  <path d="M0 218 C120 176 225 262 350 218 S585 178 720 224 V280 H0 Z" fill="#6ee7c5" opacity="0.035"/>
  <circle cx="145" cy="138" r="103" fill="none" stroke="#9b7cff" stroke-opacity="0.08"/>
  <circle cx="145" cy="138" r="82" fill="none" stroke="#6ee7c5" stroke-opacity="0.11" stroke-dasharray="2 8"/>

  <!-- Twenty-two lights: twenty-two scripts produce twenty-two typed facts. -->
  <g fill="#6ee7c5">
    <circle cx="55" cy="92" r="2.6"/><circle cx="55" cy="105" r="2.6"/>
    <circle cx="48" cy="122" r="2.6"/><circle cx="48" cy="135" r="2.6"/>
    <circle cx="49" cy="152" r="2.6"/><circle cx="49" cy="165" r="2.6"/>
    <circle cx="60" cy="181" r="2.6"/><circle cx="60" cy="194" r="2.6"/>
    <circle cx="79" cy="205" r="2.6"/><circle cx="90" cy="212" r="2.6"/>
  </g>
  <g fill="#a990ff">
    <circle cx="200" cy="205" r="2.6"/><circle cx="211" cy="196" r="2.6"/>
    <circle cx="226" cy="179" r="2.6"/><circle cx="232" cy="166" r="2.6"/>
    <circle cx="239" cy="149" r="2.6"/><circle cx="241" cy="136" r="2.6"/>
    <circle cx="236" cy="117" r="2.6"/><circle cx="232" cy="104" r="2.6"/>
    <circle cx="221" cy="87" r="2.6"/><circle cx="214" cy="76" r="2.6"/>
    <circle cx="196" cy="61" r="2.6"/><circle cx="185" cy="54" r="2.6"/>
  </g>

  <!-- A native property-list document, folded once and handled carefully. -->
  <g filter="url(#shadow)">
    <path d="M90 42 H170 L211 83 V218 H90 Z" fill="#171026" stroke="url(#document)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M170 42 V83 H211" fill="#2f2250" stroke="#9b7cff" stroke-width="3" stroke-linejoin="round"/>
    <path d="M112 105 L101 116 L112 127 M178 105 L189 116 L178 127" fill="none" stroke="#6ee7c5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M114 169 H176 M114 186 H161" stroke="#8069bd" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
  </g>

  <!-- Perl's pearl becomes the typed value at the center of the plist. -->
  <circle cx="145" cy="130" r="29" fill="#a990ff" opacity="0.22" filter="url(#soft-glow)"/>
  <circle cx="145" cy="130" r="24" fill="url(#pearl)" stroke="#ffffff" stroke-opacity="0.7"/>
  <ellipse cx="137" cy="121" rx="7" ry="5" fill="#ffffff" opacity="0.82" transform="rotate(-22 137 121)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="288" y="116" fill="url(#wordmark)" font-size="60" font-weight="760" letter-spacing="-2.2">munki-perls</text>
    <text x="291" y="153" fill="#d8d1e7" font-size="18" font-weight="520" letter-spacing="2.8">NATIVE MAC FACTS IN CLASSIC PERL</text>
    <line x1="291" y1="177" x2="642" y2="177" stroke="#ffffff" stroke-opacity="0.14"/>
    <g font-size="13" font-weight="650" letter-spacing="1.2">
      <rect x="291" y="195" width="97" height="30" rx="15" fill="#9b7cff" fill-opacity="0.14" stroke="#9b7cff" stroke-opacity="0.5"/>
      <text x="312" y="215" fill="#cdbfff">22 FACTS</text>
      <rect x="399" y="195" width="111" height="30" rx="15" fill="#6ee7c5" fill-opacity="0.1" stroke="#6ee7c5" stroke-opacity="0.42"/>
      <text x="414" y="215" fill="#95f0d9">22 SCRIPTS</text>
      <rect x="521" y="195" width="121" height="30" rx="15" fill="#ffbd72" fill-opacity="0.09" stroke="#ffbd72" stroke-opacity="0.4"/>
      <text x="541" y="215" fill="#ffd19d">ONE PLIST</text>
    </g>
  </g>
</svg>
